<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Obsession Trading Academy - Full Analysis</title>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            padding: 10px; 
            box-sizing: border-box;
            gap: 10px; 
        }
        
        .academy-header { 
            text-align: center; 
            font-size: 32px; 
            font-weight: 900; 
            background: linear-gradient(90deg, #ff0000, #ffae00, #00ff00, #00fbff, #bd00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            margin: 0;
        }

        /* UPDATED NAV HUB WITH TIGRIGNA TEXT */
        .nav-hub {
            display: flex;
            align-items: center; /* Vertical center */
            justify-content: space-between; /* Space between text and links */
            padding: 10px 15px;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
        }

        .tigrigna-text {
            font-size: 14px;
            font-weight: bold;
            line-height: 1.4;
            /* Multi-color gradient for the Tigrigna text */
            background: linear-gradient(to right, #00fbff, #00ff00, #ffee00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: left;
            max-width: 40%;
        }

        .nav-links-group {
            display: flex;
            gap: 8px;
        }

        .nav-link {
            color: #fff;
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            padding: 6px 10px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #1a1a1a;
            transition: 0.2s;
        }
        .nav-link:hover {
            border-color: #00fbff;
            color: #00fbff;
        }

        .main-row { 
            display: flex; 
            flex: 1; 
            gap: 10px; 
            min-height: 0; 
        }
        
        .chart-area { 
            flex: 4; 
            border: 1px solid #333; 
            border-radius: 8px; 
            overflow: hidden; 
            background: #131722;
        }

        .sidebar { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            min-width: 260px;
        }

        .widget-box { flex: 1; border: 1px solid #333; background: #131722; border-radius: 8px; overflow: hidden; }
        
        .button-group { display: flex; gap: 5px; }
        button { background: #222; color: #fff; border: 1px solid #444; padding: 10px; cursor: pointer; border-radius: 4px; flex: 1; font-weight: bold; }
        button:hover { background: #00ff00; color: #000; }
        
        .ticker-row { height: 40px; }
    </style>
</head>
<body>

<div class="container">
    <div class="ticker-row">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            { "symbols": [
                {"proName": "BINANCE:BTCUSDT", "title": "BTC/USDT"},
                {"proName": "BINANCE:ETHUSDT", "title": "ETH/USDT"},
                {"proName": "BINANCE:SOLUSDT", "title": "SOL/USDT"},
                {"proName": "CRYPTOCAP:TOTAL", "title": "Total Cap"},
                {"proName": "CRYPTOCAP:BTC.D", "title": "BTC Dom"}
            ], "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "de" }
            </script>
        </div>
    </div>

    <div class="academy-header">Obsession Trading Academy tools</div>

    <div class="nav-hub">
        <div class="tigrigna-text">
            ኩሉ አብ ኢድና ኢዩ ክመሃር ዝደሊ ንሕግዝ<br>
            ካብ ጉዪ ምውኣል ክሳድ ምሓዝ ፎሎው በል ጥራሕ
        </div>
        <div class="nav-links-group">
            <a href="https://www.coinglass.com/pro/liquidation/HeatMap" target="_blank" class="nav-link">🔥 HEATMAP</a>
            <a href="https://www.binance.com/en/futures/home" target="_blank" class="nav-link">🔶 BINANCE</a>
            <a href="https://www.bybit.com/en/trade/usdt/BTCUSDT" target="_blank" class="nav-link">📈 BYBIT</a>
            <a href="https://sosovalue.com/" target="_blank" class="nav-link">📊 SOSOVALUE</a>
            <a href="https://chatgpt.com" target="_blank" class="nav-link">🤖 AI</a>
        </div>
    </div>

    <div class="main-row">
        <div class="chart-area">
            <div class="tradingview-widget-container" style="height:100%;width:100%">
                <div id="tradingview_advanced" style="height:100%;width:100%"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.widget({
                  "autosize": true,
                  "symbol": "OANDA:XAUUSD",
                  "interval": "D",
                  "timezone": "Etc/UTC",
                  "theme": "dark",
                  "style": "1",
                  "locale": "de",
                  "toolbar_bg": "#f1f3f6",
                  "enable_publishing": false,
                  "allow_symbol_change": true,
                  "container_id": "tradingview_advanced"
                });
                </script>
            </div>
        </div>

        <div class="sidebar">
            <div class="button-group">
                <button onclick="window.open('https://www.goldpreis.de')">Open Goldpreis.de</button>
                <button>Search All Years</button>
            </div>

            <div class="widget-box">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                { "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%", "locale": "de", "importanceFilter": "-1,0,1", "currencyFilter": "USD,EUR" }
                </script>
            </div>

            <div class="widget-box">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                { "feedMode": "all_symbols", "colorTheme": "dark", "isTransparent": true, "displayMode": "regular", "width": "100%", "height": "100%", "locale": "de" }
                </script>
            </div>
        </div>
    </div>
</div>

</body>
</html>
