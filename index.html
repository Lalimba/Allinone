<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Obsession Trading Academy Dashboard</title>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; padding: 10px; overflow: hidden; }
        .container { display: flex; flex-direction: column; height: 98vh; gap: 10px; }
        
        /* THE NEW HEADER */
        .academy-header { 
            text-align: center; 
            font-size: 32px; 
            font-weight: bold; 
            padding: 10px 0;
            background: linear-gradient(90deg, #ff0000, #ffae00, #ffee00, #00ff00, #00fbff, #0011ff, #bd00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .top-row { display: flex; flex: 1; gap: 10px; overflow: hidden; }
        .chart-area { flex: 3; border: 1px solid #333; display: flex; flex-direction: column; }
        .sidebar { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .ticker-row { height: 46px; border-bottom: 1px solid #333; margin-bottom: 5px; }
        .button-group { display: flex; gap: 5px; margin-bottom: 5px; }
        button { background: #222; color: #fff; border: 1px solid #444; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        button:hover { background: #333; border-color: #666; }
        .widget-box { flex: 1; border: 1px solid #333; background: #131722; border-radius: 4px; overflow: hidden; }
    </style>
</head>
<body>

<div class="container">
    <div class="ticker-row">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
            "symbols": [
                {"proName": "FX_IDC:USDINR", "title": "USD/INR"},
                {"description": "FED Rate", "proName": "ECONOMICS:USINTR"},
                {"description": "Gold", "proName": "OANDA:XAUUSD"},
                {"description": "DXY", "proName": "CAPITALCOM:DXY"}
            ],
            "showSymbolLogo": true,
            "colorTheme": "dark",
            "isTransparent": true,
            "displayMode": "adaptive",
            "locale": "de"
            }
            </script>
        </div>
    </div>

    <div class="academy-header">
        Obsession Trading Academy tools
    </div>

    <div class="top-row">
        <div class="chart-area">
            <iframe src="https://www.tradingview.com/widgetembed/?frameElementId=tradingview_1&symbol=OANDA:XAUUSD&interval=D&hidesidetoolbar=0&symboledit=1&saveimage=1&toolbarbg=f1f3f6&studies=[]&theme=dark&style=1&timezone=Etc/UTC" 
                    style="width: 100%; height: 100%; border: none;"></iframe>
        </div>

        <div class="sidebar">
            <div class="button-group">
                <button onclick="window.open('https://www.goldpreis.de')">Open Goldpreis.de</button>
                <button>Search All Years</button>
            </div>

            <div class="widget-box">
                <div class="tradingview-widget-container" style="height:100%;width:100%">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                    {
                    "colorTheme": "dark",
                    "isTransparent": true,
                    "width": "100%",
                    "height": "100%",
                    "locale": "de",
                    "importanceFilter": "-1,0,1",
                    "currencyFilter": "USD,EUR"
                    }
                    </script>
                </div>
            </div>

            <div class="widget-box">
                <div class="tradingview-widget-container" style="height:100%;width:100%">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                    {
                    "feedMode": "all_symbols",
                    "colorTheme": "dark",
                    "isTransparent": true,
                    "displayMode": "regular",
                    "width": "100%",
                    "height": "100%",
                    "locale": "de"
                    }
                    </script>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
