name: Live BTC Metrics

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

jobs:
  live_metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas python-dotenv

      - name: Run live metrics updater
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COINGLASS_HEADER_1_NAME: ${{ secrets.COINGLASS_HEADER_1_NAME }}
          COINGLASS_HEADER_1_VALUE: ${{ secrets.COINGLASS_HEADER_1_VALUE }}
          COINGLASS_HEADER_2_NAME: ${{ secrets.COINGLASS_HEADER_2_NAME }}
          COINGLASS_HEADER_2_VALUE: ${{ secrets.COINGLASS_HEADER_2_VALUE }}
        run: |
          python scripts/live_metrics.py
